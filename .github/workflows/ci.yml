name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    name: Lint & Format (Biome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies (worker)
        run: npm ci

      - name: Install dependencies (cli)
        run: npm ci
        working-directory: cli

      - name: Biome check — worker
        run: npm run check

      - name: Biome check — cli
        run: npm run lint
        working-directory: cli

  build:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies (worker)
        run: npm ci

      - name: Install dependencies (cli)
        run: npm ci
        working-directory: cli

      - name: TypeScript check — worker
        run: npx tsc --noEmit

      - name: TypeScript check — cli
        run: npx tsc --noEmit
        working-directory: cli

      - name: Build — cli
        run: npm run build
        working-directory: cli

      - name: Wrangler dry-run
        run: npx wrangler deploy --dry-run --outdir dist
        env:
          CLOUDFLARE_API_TOKEN: "dummy"
          CLOUDFLARE_ACCOUNT_ID: "dummy"
