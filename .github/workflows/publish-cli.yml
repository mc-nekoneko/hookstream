name: Publish CLI to npm

on:
  push:
    tags:
      - "cli-v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish CLI package
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: cli/package-lock.json

      - name: Validate tag version
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#cli-v}"

          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag version $TAG_VERSION does not match cli/package.json version $PACKAGE_VERSION" >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Verify package contents
        run: |
          PACK_OUTPUT="$(npm pack --dry-run 2>&1)"
          echo "$PACK_OUTPUT"
          echo "$PACK_OUTPUT" | grep -q 'dist/index.js'

      - name: Smoke test packed CLI
        run: |
          PACK_FILE=$(npm pack --pack-destination "$RUNNER_TEMP" | tail -n 1)
          PREFIX_DIR="$RUNNER_TEMP/prefix"
          npm install -g "$RUNNER_TEMP/$PACK_FILE" --prefix "$PREFIX_DIR"
          "$PREFIX_DIR/bin/hookstream" --help >/dev/null

      - name: Publish to npm
        run: npm publish
